<div class="status-selector" id="status-selector-{{ unique_id }}">
    <button class="status-selector-trigger"
            style="--status-color: {{ status_meta[current_status].color }}"
            aria-expanded="false"
            aria-haspopup="true">
        <span class="status-selector-dot"></span>
        {{ status_meta[current_status].label }}
        <svg class="status-selector-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <div class="status-popover" role="menu">
        {% set groups = [
            ("Triage", ["new", "interested", "archived"]),
            ("Progress", ["enquired", "viewing_booked", "viewed"]),
            ("Outcome", ["applied", "offered", "rejected"]),
        ] %}
        {% for group_label, statuses in groups %}
        <div class="status-popover-group" role="group" aria-label="{{ group_label }}">
            <span class="status-popover-label">{{ group_label }}</span>
            {% for s in statuses %}
            <button class="status-option {% if s == current_status %}active{% endif %}"
                    style="--option-color: {{ status_meta[s].color }}"
                    role="menuitem"
                    hx-patch="/property/{{ unique_id }}/status"
                    hx-vals='{"status": "{{ s }}"}'
                    hx-target="closest .status-selector-wrap"
                    hx-swap="innerHTML"
                    hx-disabled-elt="this"
                    {% if s == current_status %}disabled{% endif %}>
                <span class="status-option-dot"></span>
                {{ status_meta[s].label }}
                {% if s == current_status %}
                <svg class="status-option-check" width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M3.5 7L6 9.5L10.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                {% endif %}
            </button>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
</div>
