{% if error %}
<div class="viewing-msg-error">{{ error }}</div>
{% else %}
<div class="viewing-msg-card">
    <textarea class="viewing-msg-text" id="viewing-msg-text" rows="3" readonly>{{ message }}</textarea>
    <div class="viewing-msg-actions">
        <button class="viewing-msg-btn viewing-msg-copy" onclick="copyViewingMessage()">Copy</button>
        <button class="viewing-msg-btn viewing-msg-regen"
                hx-post="/property/{{ unique_id }}/viewing-message/regenerate"
                hx-target="#viewing-message-container"
                hx-disabled-elt="this"
                hx-indicator="#msg-regen-spinner">Regenerate</button>
        <span class="htmx-indicator" id="msg-regen-spinner">Regenerating…</span>
    </div>
    {% if source_urls %}
    <div class="viewing-msg-portals">
        <span class="viewing-msg-portals-label">Send via:</span>
        {% for source, url in source_urls.items() %}
        <a href="{{ url }}" target="_blank" rel="noopener" class="viewing-msg-portal-link">{{ source_names.get(source, source) }}</a>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endif %}
