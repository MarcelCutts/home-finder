name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 02:00 UTC — slow + browser tests
    - cron: "0 2 * * 0"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run ruff check --output-format=github src tests
      - run: uv run ruff format --check src tests

  typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run mypy src

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run pytest --cov --cov-report=xml --cov-report=term
        env:
          PYTHONUNBUFFERED: "1"
          HYPOTHESIS_PROFILE: ci
      - uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request'
        with:
          GITHUB_TOKEN: ${{ github.token }}
          ANNOTATE_MISSING_LINES: true

  slow-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run pytest -m slow -v --timeout=120
        env:
          PYTHONUNBUFFERED: "1"

  browser-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run playwright install chromium --with-deps
      - run: uv run pytest -m browser -v --tracing=retain-on-failure
        env:
          PYTHONUNBUFFERED: "1"
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
